<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Back sheet (tilted left) - Soft Indigo Tint -->
  <g transform="rotate(-14 36 52)">
    <rect x="12" y="10" width="56" height="74" rx="3" fill="#e0e7ff" stroke="#1e293b" stroke-width="4.5" stroke-linejoin="round" />
    <rect x="20" y="22" width="40" height="4.5" rx="2" fill="#4f46e5" />
    <rect x="20" y="31" width="32" height="4.5" rx="2" fill="#6366f1" />
    <rect x="20" y="40" width="38" height="4.5" rx="2" fill="#6366f1" />
    <rect x="20" y="49" width="26" height="4.5" rx="2" fill="#818cf8" />
  </g>

  <!-- Middle sheet (tilted right) - Soft Teal/Emerald Tint -->
  <g transform="rotate(10 64 52)">
    <rect x="32" y="10" width="56" height="74" rx="3" fill="#ccfbf1" stroke="#1e293b" stroke-width="4.5" stroke-linejoin="round" />
    <rect x="40" y="22" width="40" height="4.5" rx="2" fill="#0d9488" />
    <rect x="40" y="31" width="34" height="4.5" rx="2" fill="#14b8a6" />
    <rect x="40" y="40" width="38" height="4.5" rx="2" fill="#14b8a6" />
    <rect x="40" y="49" width="28" height="4.5" rx="2" fill="#2dd4bf" />
  </g>

  <!-- Front sheet (straight) - Bright Clean Paper with Vibrant Colors -->
  <g>
    <!-- Drop Shadow for Front Sheet -->
    <rect x="24" y="20" width="56" height="74" rx="3" fill="#0f172a" opacity="0.12" />
    <!-- Front Paper Base -->
    <rect x="22" y="16" width="56" height="74" rx="3" fill="#ffffff" stroke="#1e293b" stroke-width="4.5" stroke-linejoin="round" />
    
    <!-- Top Header Accent Bar -->
    <rect x="30" y="26" width="40" height="5" rx="2.5" fill="#2563eb" />
    <!-- Lines of Text -->
    <rect x="30" y="35" width="34" height="4" rx="2" fill="#3b82f6" />
    <rect x="30" y="43" width="38" height="4" rx="2" fill="#3b82f6" />
    <rect x="30" y="51" width="28" height="4" rx="2" fill="#60a5fa" />

    <rect x="30" y="63" width="40" height="4" rx="2" fill="#d97706" />
    <rect x="30" y="71" width="35" height="4" rx="2" fill="#f59e0b" />
    <rect x="30" y="79" width="24" height="4" rx="2" fill="#fbbf24" />
  </g>
</svg>
